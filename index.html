<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lucy NORCET Prep V2</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div id="home" class="home">

<h1>🩺 Lucy NORCET Prep</h1>

<p class="subtitle">Founder: Gaurav</p>

<select id="subject">
<option value="obg">🩺 OBG Nursing</option>
<option value="msn">🏥 Medical Surgical Nursing</option>
<option value="chn">🌍 Community Health Nursing</option>
<option value="mhn">🧠 Mental Health Nursing</option>
<option value="child">👶 Child Health Nursing</option>
</select>

<button onclick="startOBG()">
📚 Start Quiz
</button>

</div>

<div id="quizBox" style="display:none;">

<div class="progress">
<div id="progressBar"></div>
</div>

<p id="progressText">Question 1 / 3</p>

<h3 id="timer">⏱️ 30s</h3>

<h2 id="question"></h2>

<div id="options"></div>
<button id="bookmarkBtn">
⭐ Bookmark Question
</button>
<button id="nextBtn">Next →</button>

<p id="score">Score : 0</p>

</div>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
